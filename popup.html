<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>BTC AI WORK — Miner</title>
</head>
<body>
  <header class="head">
    <div class="logo" aria-hidden="true">₿</div>
    <div class="head-text">
      <h1>BTC AI WORK</h1>
      <span class="sub">Pool Miner · runs in the background</span>
    </div>
  </header>

  <div id="status" class="status status-idle" aria-hidden="true">stopped</div>

  <section class="controls">
    <label class="field">
      <span class="field-label">Wallet (payout address)</span>
      <input id="worker" type="text" autocomplete="off" spellcheck="false" placeholder="bc1q… or account.worker" />
    </label>

    <div class="row2">
      <label class="field">
        <span class="field-label">Password</span>
        <input id="password" type="text" autocomplete="off" spellcheck="false" value="x" />
      </label>
      <div></div>
    </div>

    <div id="bridge-fields" style="display:none">
      <label class="field">
        <span class="field-label">CKPool behind bridge (host:port)</span>
        <input id="pool-addr" type="text" autocomplete="off" spellcheck="false" value="127.0.0.1:4333" />
      </label>
    </div>

    <div id="direct-fields">
      <label class="field">
        <span class="field-label">Pool WebSocket URL (wss://)</span>
        <input id="direct-url" type="text" autocomplete="off" spellcheck="false" value="wss://mine.btcaiwork.com" />
      </label>
    </div>

    <details class="adv">
      <summary>Advanced</summary>
      <div class="adv-body">
        <label class="field">
          <span class="field-label">Connection method</span>
          <select id="mode">
            <option value="direct">Direct WebSocket (wss://)</option>
            <option value="bridge" selected>Via bridge (TCP pool)</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">Bridge WebSocket URL</span>
          <input id="bridge-url" type="text" autocomplete="off" spellcheck="false" value="wss://mine.btcaiwork.com" />
        </label>
        <label class="field">
          <span class="field-label">prevhash (switch if shares are rejected)</span>
          <select id="prevhash-mode">
            <option value="wordswap" selected>wordswap</option>
            <option value="reverse">reverse</option>
            <option value="asis">as-is</option>
          </select>
        </label>
      </div>
    </details>

    <button id="toggle" class="btn" type="button">▶ Connect and mine</button>
  </section>

  <section class="stats">
    <div class="hashrate">
      <div id="hashrate" class="hashrate-value">0 H/s</div>
      <div class="hashrate-label">hashrate</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div id="submitted" class="stat-value sent">0</div><div class="stat-label">submitted</div></div>
      <div class="stat"><div id="accepted" class="stat-value ok">0</div><div class="stat-label">accepted</div></div>
      <div class="stat"><div id="rejected" class="stat-value bad">0</div><div class="stat-label">rejected</div></div>
      <div class="stat"><div id="difficulty" class="stat-value">—</div><div class="stat-label">difficulty</div></div>
    </div>
  </section>

  <section class="logwrap">
    <div class="section-label">Stratum log</div>
    <ul id="log" class="log" aria-live="polite"></ul>
  </section>

  <footer class="foot">
    Mining continues in the background while Chrome is open — you can close this popup. On regular hardware, BTC income is ≈ 0 due to SHA-256 physics.
  </footer>

  <script src="popup.js"></script>
</body>
</html>
